name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build:pages
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
  cleanup:
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    steps:
      - name: Keep only latest Pages deployment
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          deployments=$(gh api "repos/$REPO/deployments?environment=github-pages&per_page=100" --jq '.[].id')
          latest=$(printf '%s\n' "$deployments" | head -n 1)
          printf '%s\n' "$deployments" | tail -n +2 | while read -r deployment; do
            [ -n "$deployment" ] || continue
            gh api "repos/$REPO/deployments/$deployment/statuses" \
              --method POST \
              -f state=inactive \
              -f environment=github-pages >/dev/null
            gh api "repos/$REPO/deployments/$deployment" \
              --method DELETE >/dev/null
          done
          echo "Kept deployment ${latest:-none}"
